<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="480">
      <stop offset="0%" stop-color="#0A1430"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="glow" x1="320" y1="0" x2="320" y2="480">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="640" height="480" fill="url(#bg)"/>
  <ellipse cx="320" cy="200" rx="180" ry="120" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Network nodes -->
  <circle cx="160" cy="180" r="4" fill="#0EA5E9" opacity="0.8"/>
  <circle cx="280" cy="120" r="5" fill="#0EA5E9"/>
  <circle cx="400" cy="160" r="4" fill="#0EA5E9" opacity="0.7"/>
  <circle cx="480" cy="240" r="6" fill="#10B981" opacity="0.9"/>
  <circle cx="320" cy="280" r="8" fill="#0EA5E9"/>
  <circle cx="200" cy="320" r="4" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="440" cy="340" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="120" cy="260" r="3" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="520" cy="180" r="4" fill="#10B981" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="160" y1="180" x2="280" y2="120" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
  <line x1="280" y1="120" x2="400" y2="160" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="160" x2="480" y2="240" stroke="#0EA5E9" stroke-width="0.5" opacity="0.25"/>
  <line x1="480" y1="240" x2="320" y2="280" stroke="#10B981" stroke-width="0.5" opacity="0.3"/>
  <line x1="320" y1="280" x2="200" y2="320" stroke="#8B5CF6" stroke-width="0.5" opacity="0.25"/>
  <line x1="320" y1="280" x2="440" y2="340" stroke="#0EA5E9" stroke-width="0.5" opacity="0.2"/>
  <line x1="160" y1="180" x2="320" y2="280" stroke="#0EA5E9" stroke-width="0.5" opacity="0.15"/>
  <line x1="120" y1="260" x2="200" y2="320" stroke="#0EA5E9" stroke-width="0.5" opacity="0.15"/>
  <line x1="520" y1="180" x2="480" y2="240" stroke="#10B981" stroke-width="0.5" opacity="0.2"/>
  <!-- Dashboard mock -->
  <rect x="180" y="360" width="280" height="80" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(14,165,233,0.2)" stroke-width="0.5"/>
  <rect x="200" y="380" width="60" height="8" rx="2" fill="#0EA5E9" opacity="0.6"/>
  <rect x="200" y="396" width="120" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="200" y="410" width="80" height="6" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="380" y="380" width="60" height="40" rx="4" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.2)" stroke-width="0.5"/>
  <text x="320" y="60" fill="#E2E8F0" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" opacity="0.5" letter-spacing="3">ENTERPRISE AI PLATFORM</text>
</svg>
