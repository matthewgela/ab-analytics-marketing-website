<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="Enterprise AI platform stack">
  <defs>
    <linearGradient id="hero-bg" x1="120" y1="40" x2="680" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1430" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#0A1430" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1E3A8A" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="accent-top" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="accent-left" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="accent-right" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0369A1"/>
      <stop stop-color="#075985"/>
    </linearGradient>
    <filter id="stack-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#hero-bg)"/>

  <!-- Ambient glow behind stack -->
  <ellipse cx="410" cy="310" rx="220" ry="150" fill="#0EA5E9" opacity="0.12" filter="url(#stack-glow)"/>

  <!-- Decorative connection lines -->
  <g stroke="#0EA5E9" stroke-width="1.2" opacity="0.35">
    <path d="M120 200 C200 220 260 250 300 285"/>
    <path d="M680 190 C600 215 540 245 500 280"/>
    <path d="M150 420 C240 390 300 360 330 340"/>
    <path d="M650 430 C560 400 500 370 470 345"/>
  </g>

  <!-- Floating accent nodes -->
  <g opacity="0.55" stroke="#0EA5E9" stroke-width="1" fill="none">
    <circle cx="118" cy="198" r="14"/>
    <circle cx="118" cy="198" r="5" fill="#0EA5E9" opacity="0.6" stroke="none"/>
    <rect x="662" y="176" width="22" height="22" rx="4" transform="rotate(12 673 187)"/>
    <circle cx="673" cy="187" r="4" fill="#0EA5E9" opacity="0.5" stroke="none"/>
    <path d="M142 418 L158 402 L174 418 L158 434 Z"/>
    <circle cx="648" cy="428" r="12"/>
    <path d="M642 428 H654 M648 422 V434"/>
  </g>

  <!-- Isometric stack (bottom → top) -->
  <g transform="translate(400 330)">
    <!-- Layer 5: Infrastructure -->
    <g transform="translate(0 88)">
      <path d="M-168 0 L168 0 L228 36 L-108 36 Z" fill="#3D4F6F"/>
      <path d="M168 0 L228 36 L228 60 L168 24 Z" fill="#1F2D47"/>
      <path d="M-168 0 L-108 36 L-108 60 L-168 24 Z" fill="#2A3855"/>
      <text x="0" y="18" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="9.5" font-weight="700" text-anchor="middle" letter-spacing="0.06em">INFRASTRUCTURE &amp; COMPUTE</text>
      <g transform="translate(132 -6)" stroke="#94A3B8" stroke-width="1.2" fill="none" opacity="0.7">
        <rect x="0" y="4" width="14" height="10" rx="1"/>
        <path d="M3 14 H11 M5 17 H9"/>
      </g>
    </g>

    <!-- Layer 4: Data -->
    <g transform="translate(0 66)">
      <path d="M-168 0 L168 0 L228 36 L-108 36 Z" fill="#3D4F6F"/>
      <path d="M168 0 L228 36 L228 60 L168 24 Z" fill="#1F2D47"/>
      <path d="M-168 0 L-108 36 L-108 60 L-168 24 Z" fill="#2A3855"/>
      <text x="0" y="18" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="9.5" font-weight="700" text-anchor="middle" letter-spacing="0.06em">DATA MANAGEMENT &amp; PROCESSING</text>
      <g transform="translate(-150 -6)" stroke="#94A3B8" stroke-width="1.2" fill="none" opacity="0.7">
        <ellipse cx="8" cy="10" rx="7" ry="4"/>
        <path d="M1 10 V18 C1 21 15 21 15 18 V10"/>
      </g>
    </g>

    <!-- Layer 3: AI Foundation (accent) -->
    <g transform="translate(0 44)" filter="url(#soft-glow)">
      <path d="M-168 0 L168 0 L228 36 L-108 36 Z" fill="url(#accent-top)"/>
      <path d="M168 0 L228 36 L228 60 L168 24 Z" fill="url(#accent-right)"/>
      <path d="M-168 0 L-108 36 L-108 60 L-168 24 Z" fill="url(#accent-left)"/>
      <text x="0" y="18" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="9.5" font-weight="800" text-anchor="middle" letter-spacing="0.06em">AI FOUNDATION &amp; MLOPS</text>
      <g transform="translate(0 -10)" stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.9">
        <circle cx="0" cy="0" r="9"/>
        <circle cx="-5" cy="3" r="2.5" fill="#FFFFFF" stroke="none"/>
        <circle cx="5" cy="-2" r="2.5" fill="#FFFFFF" stroke="none"/>
        <circle cx="0" cy="6" r="2" fill="#FFFFFF" stroke="none"/>
        <path d="M-5 3 L5 -2 M5 -2 L0 6 M0 6 L-5 3"/>
      </g>
    </g>

    <!-- Layer 2: Model services -->
    <g transform="translate(0 22)">
      <path d="M-168 0 L168 0 L228 36 L-108 36 Z" fill="#3D4F6F"/>
      <path d="M168 0 L228 36 L228 60 L168 24 Z" fill="#1F2D47"/>
      <path d="M-168 0 L-108 36 L-108 60 L-168 24 Z" fill="#2A3855"/>
      <text x="0" y="18" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.05em">MODEL SERVICES &amp; APP FRAMEWORK</text>
      <g transform="translate(132 -6)" stroke="#94A3B8" stroke-width="1.2" fill="none" opacity="0.7">
        <circle cx="8" cy="8" r="6"/>
        <path d="M8 5 V11 M5 8 H11"/>
      </g>
    </g>

    <!-- Layer 1: Business applications (top) -->
    <g transform="translate(0 0)">
      <path d="M-168 0 L168 0 L228 36 L-108 36 Z" fill="#4A5D7A"/>
      <path d="M168 0 L228 36 L228 60 L168 24 Z" fill="#243352"/>
      <path d="M-168 0 L-108 36 L-108 60 L-168 24 Z" fill="#33435F"/>
      <text x="0" y="18" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.05em">BUSINESS APPLICATIONS &amp; INTERFACES</text>
      <g transform="translate(-150 -6)" stroke="#94A3B8" stroke-width="1.2" fill="none" opacity="0.7">
        <path d="M2 14 V6 H14 V14"/>
        <path d="M5 10 H11 M5 12 H9"/>
      </g>
    </g>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="410" cy="458" rx="200" ry="28" fill="#020617" opacity="0.45"/>
</svg>
